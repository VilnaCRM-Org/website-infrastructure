version: "3"

tasks:
  validate:
    desc: "Validate Terraform code for CI/CD infrastructure stacks"
    cmds:
      - make terraspace-init stack=ci-cd-infrastructure
      - make terraspace-validate stack=ci-cd-infrastructure
      - make terraspace-init stack=ci-cd-iam
      - make terraspace-validate stack=ci-cd-iam
      - make terraspace-init stack=website-iam
      - make terraspace-validate stack=website-iam
      - make terraspace-init stack=iam-groups
      - make terraspace-validate stack=iam-groups
    silent: false

  format:
    desc: "Format Terraform code"
    cmds:
      - terraform fmt -recursive
    silent: false

  checkov:
    desc: "Run checkov"
    cmds:
      - checkov -o junitxml --framework terraform -d ./ --download-external-modules true | tee checkov.xml
    silent: false

  tfsec:
    desc: "Run tfsec"
    cmds:
      - tfsec ./ --format junit --out tfsec-junit.xml | tee tfsec-junit.xml
    silent: false

  summary:
    desc: "Display summary"
    deps: [validate, format, checkov, tfsec]
    cmds:
      - echo "Validation and checks have been completed."
