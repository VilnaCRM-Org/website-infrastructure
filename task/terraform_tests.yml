version: "3"

tasks:
  validate:
    desc: "Validate Terraform code"
    cmds:
      - make terraspace-init stack=website
      - make terraspace-validate stack=website
    silent: false

  format:
    desc: "Format Terraform code"
    cmds:
      - find ./terraform -path '*/.terraform/*' -prune -o -type f \( -name '*.tf' -o -name '*.tfvars' \) -print0 | xargs -0 -r terraform fmt -check -diff
    silent: false

  checkov:
    desc: "Run checkov"
    cmds:
      - checkov -o junitxml --framework terraform -d ./ --download-external-modules true | tee checkov.xml
    silent: false

  tfsec:
    desc: "Run tfsec"
    cmds:
      - tfsec ./ --format junit --out tfsec-junit.xml | tee tfsec-junit.xml
    silent: false

  summary:
    desc: "Display summary"
    deps: [validate, format, checkov, tfsec]
    cmds:
      - echo "Validation and checks have been completed."
