name: Trigger AWS CI-CD-Infra CodePipeline

on:
  push:
    branches-ignore:
      - main

env:
  AWS_REGION: ${{ vars.AWS_REGION }}

permissions:
  id-token: write
  contents: read

jobs:
  trigger-pipeline:
    name: Trigger AWS CodePipeline
    runs-on: ubuntu-latest
    env:
      AWS_ROLE_TO_ASSUME: ${{ secrets.AWS_CI_CD_INFRA_ROLE_TO_ASSUME_TEST }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Skip pipeline trigger when AWS role is unavailable
        if: ${{ env.AWS_ROLE_TO_ASSUME == '' }}
        run: echo "AWS_CI_CD_INFRA_ROLE_TO_ASSUME_TEST is unavailable for this event; skipping CodePipeline trigger."

      - name: Configure AWS Credentials
        if: ${{ env.AWS_ROLE_TO_ASSUME != '' }}
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ env.AWS_ROLE_TO_ASSUME }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Trigger CodePipeline
        if: ${{ env.AWS_ROLE_TO_ASSUME != '' }}
        run: |
          aws codepipeline start-pipeline-execution --name ci-cd-infra-test-pipeline
