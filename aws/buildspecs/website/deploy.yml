version: 0.2

phases:
  install:
    runtime-versions:
      nodejs: $NODEJS_VERSION
      python: $PYTHON_VERSION
    commands:
      - ". ${CODEBUILD_SRC_DIR}/${SCRIPT_DIR}/sh/website_installation.sh"
      - "cd ${CODEBUILD_SRC_DIR}/website"

  build:
    commands:
      - "echo #### Build Project"
      - "make build-out"
      - "echo #### Deploy Project"
      - |
        alarm_exists() {
          [ "$(aws cloudwatch describe-alarms --alarm-names "$ALARM_NAME" --query 'MetricAlarms[0].AlarmName' --output text)" != "None" ]
        }

        restore_alarm_actions() {
          echo "#### Turn On Alarm Actions"
          if alarm_exists; then
            aws cloudwatch enable-alarm-actions --alarm-names "$ALARM_NAME"
          else
            echo "Alarm $ALARM_NAME not found, skipping enable"
          fi
        }

        trap restore_alarm_actions EXIT

        echo "#### Turn Off Alarm Actions"
        if alarm_exists; then
          aws cloudwatch disable-alarm-actions --alarm-names "$ALARM_NAME"
        else
          echo "Alarm $ALARM_NAME not found, skipping disable"
        fi

        python3 ${CODEBUILD_SRC_DIR}/${SCRIPT_DIR}/py/deploy_content.py
        echo "#### Invalidate CloudFront Cache"
        python3 ${CODEBUILD_SRC_DIR}/${SCRIPT_DIR}/py/cache_invalidation.py
      - |
        if [ "$ENABLE_CLOUDFRONT_STAGING" = "true" ]; then
          python3 ${CODEBUILD_SRC_DIR}/${SCRIPT_DIR}/py/continuous_deployment_switch.py
        else
          echo "CloudFront staging disabled, skipping continuous deployment switch"
        fi
