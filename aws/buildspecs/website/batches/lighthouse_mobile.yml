version: 0.2

env:
  variables:
    ACCOUNT_ID: $ACCOUNT_ID
    ENVIRONMENT: $ENVIRONMENT
    TEST_REPORTS_BUCKET: $TEST_REPORTS_BUCKET
    LHCI_REPORTS_BUCKET: $LHCI_REPORTS_BUCKET
    WEBSITE_GIT_REPOSITORY_LINK: $WEBSITE_GIT_REPOSITORY_LINK
    DIND: "1"

phases:
  install:
    commands:
      - |
        . ${CODEBUILD_SRC_DIR}/${SCRIPT_DIR}/sh/install_packages.sh
        . ${CODEBUILD_SRC_DIR}/${SCRIPT_DIR}/sh/website_installation.sh
        . ${CODEBUILD_SRC_DIR}/${SCRIPT_DIR}/sh/setup_docker.sh

  build:
    commands:
      - |
        . ${CODEBUILD_SRC_DIR}/${SCRIPT_DIR}/sh/create_env.sh
        echo "Running Lighthouse Mobile tests with new batch script"
        cd ${CODEBUILD_SRC_DIR}/website
        . ${CODEBUILD_SRC_DIR}/website/scripts/ci/batch_lhci_leak.sh test-lighthouse-mobile
    finally:
      - ". ${CODEBUILD_SRC_DIR}/${SCRIPT_DIR}/sh/run_reports.sh"
      - "mkdir -p ${CODEBUILD_SRC_DIR}/codepipeline-artifacts"
      - "printf 'lighthouse mobile complete\n' > ${CODEBUILD_SRC_DIR}/codepipeline-artifacts/lighthouse-mobile.txt"

artifacts:
  files:
    - "codepipeline-artifacts/lighthouse-mobile.txt"
