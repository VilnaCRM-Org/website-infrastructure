version: 0.2

phases:
  install:
    runtime-versions:
      ruby: $RUBY_VERSION
    commands:
      - ". ${CODEBUILD_SRC_DIR}/${SCRIPT_DIR}/sh/credentials.sh"
      - "dnf install -y yum-utils"
      - ". ${CODEBUILD_SRC_DIR}/${SCRIPT_DIR}/sh/terraform_installation.sh"
  build:
    commands:
      - "cd ${CODEBUILD_SRC_DIR}"
      - "echo ## TERRASPACE PLAN : Generate the Terraform Plan"
      - 'make terraspace-plan-file stack="website" out="website.plan"'
      - "bash ${CODEBUILD_SRC_DIR}/${SCRIPT_DIR}/sh/stage_plan_artifacts.sh"
artifacts:
  files:
    - "Makefile"
    - "aws/canary/**/*"
    - "aws/buildspecs/website/**/*"
    - "aws/scripts/**/*"
    - "terraform/**/*"
    - "codepipeline-artifacts/plans/**/*"

cache:
  paths:
    - "/bin"
    - "/usr/local/bin"
    - "/root/.terraform"
    - "/root/.cache"
    - "/root/.gem"
    - "/usr/local/bundle"
