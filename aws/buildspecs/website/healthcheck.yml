version: 0.2

phases:
  install:
    commands:
      - "python3 --version"
      - '[ -n "${WEBSITE_URL:-}" ] || { echo "WEBSITE_URL must be set for the website healthcheck"; exit 1; }'
  build:
    commands:
      - "echo ## Test Website Connection..."
      - "python3 ${CODEBUILD_SRC_DIR}/aws/scripts/py/healthcheck.py --url https://www.${WEBSITE_URL} --expect-cn ${WEBSITE_URL} --expect-issuer-country US --expect-issuer-org Amazon --expect-issuer-cn-regex 'Amazon RSA 2048 M[0-9]+' --min-cert-days 30"
      - "python3 ${CODEBUILD_SRC_DIR}/aws/scripts/py/healthcheck.py --url https://${WEBSITE_URL} --expect-cn ${WEBSITE_URL} --expect-issuer-country US --expect-issuer-org Amazon --expect-issuer-cn-regex 'Amazon RSA 2048 M[0-9]+' --min-cert-days 30"
    finally:
      - "mkdir -p ${CODEBUILD_SRC_DIR}/codepipeline-artifacts"
      - "printf 'healthcheck complete\n' > ${CODEBUILD_SRC_DIR}/codepipeline-artifacts/healthcheck.txt"

artifacts:
  files:
    - "codepipeline-artifacts/healthcheck.txt"
