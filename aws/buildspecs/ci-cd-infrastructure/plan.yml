version: 0.2

env:
  variables:
    TS_TERRAFORM_BIN: "terraform"
    TS_VERSION_CHECK: "0"

phases:
  install:
    runtime-versions:
      python: $PYTHON_VERSION
      ruby: $RUBY_VERSION
    commands:
      - "echo ## Install Terraspace"
      - ". ${CODEBUILD_SRC_DIR}/${SCRIPT_DIR}/sh/credentials.sh"
      - "dnf install -y yum-utils"
      - ". ${CODEBUILD_SRC_DIR}/${SCRIPT_DIR}/sh/terraform_installation.sh"
      - "dnf update -y"
  build:
    commands:
      - "cd ${CODEBUILD_SRC_DIR}"
      - "echo ## TERRASPACE Init : Initialize CI/CD infrastructure providers and modules"
      - "make terraspace-ci-cd-infra-init"
      - "echo ## Getting Token from Secrets Manager"
      - ". ${CODEBUILD_SRC_DIR}/${SCRIPT_DIR}/sh/retrieve_token.sh"
      - "echo ## TERRASPACE PLAN : Generate the Terraform Plan"
      - 'make terraspace-plan-file stack="ci-cd-infrastructure" out="ci-cd-infrastructure.plan"'
      - 'make terraspace-plan-file stack="ci-cd-iam" out="ci-cd-iam.plan"'
      - 'make terraspace-plan-file stack="website-iam" out="website-iam.plan"'
      - 'make terraspace-plan-file stack="iam-groups" out="iam-groups.plan"'
      - "mkdir -p ${CODEBUILD_SRC_DIR}/codepipeline-artifacts/plans"
      - "cp ./*.plan ${CODEBUILD_SRC_DIR}/codepipeline-artifacts/plans/"

artifacts:
  files:
    - "codepipeline-artifacts/plans/**/*"

cache:
  paths:
    - "/bin"
    - "/usr/local/bin"
    - "/root/.terraform"
    - "/root/.cache"
    - "/root/.gem"
    - "/usr/local/bundle"
