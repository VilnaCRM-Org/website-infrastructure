version: 0.2

env:
  variables:
    TFSEC_VERSION: "v1.28.5"
    GO_TASK_VERSION: "v3.49.0"
    TS_TERRAFORM_BIN: "terraform"
    TS_VERSION_CHECK: "0"

phases:
  install:
    runtime-versions:
      python: $PYTHON_VERSION
      golang: $GOLANG_VERSION
      ruby: $RUBY_VERSION
    commands:
      - "echo ## Install Terraspace"
      - ". ${CODEBUILD_SRC_DIR}/${SCRIPT_DIR}/sh/credentials.sh"
      - "dnf install -y yum-utils"
      - ". ${CODEBUILD_SRC_DIR}/${SCRIPT_DIR}/sh/terraform_installation.sh"
      - "dnf update -y"
      - "echo ## Install Validation Software"
      - "pip3 install checkov"
      - "curl -s https://raw.githubusercontent.com/aquasecurity/tfsec/master/scripts/install_linux.sh | bash"
      - "go install github.com/go-task/task/v3/cmd/task@${GO_TASK_VERSION}"
  build:
    commands:
      - "cd ${CODEBUILD_SRC_DIR}"
      - "echo ## VALIDATION : Starting ..."
      - "mkdir -p ${CODEBUILD_SRC_DIR}/reports"
      - "cp ${CODEBUILD_SRC_DIR}/task/terraform_tests_ci_cd_infrastructure.yml ${CODEBUILD_SRC_DIR}/Taskfile.yml"
      - "task --verbose summary"
      - "cp checkov.xml ${CODEBUILD_SRC_DIR}/reports/checkov.xml"
      - "cp tfsec-junit.xml ${CODEBUILD_SRC_DIR}/reports/tfsec-junit.xml"
    finally:
      - "mkdir -p ${CODEBUILD_SRC_DIR}/codepipeline-artifacts"
      - "printf 'validate complete\n' > ${CODEBUILD_SRC_DIR}/codepipeline-artifacts/validate.txt"

artifacts:
  # Temporary bootstrap payload for stale shared-pipeline artifact wiring.
  # After issue #106 is fully rolled out and the live pipeline is stable on
  # SourceOutput/PlanOutput, tighten this back to the minimal validate set.
  files:
    - "Makefile"
    - "aws/buildspecs/ci-cd-infrastructure/**/*"
    - "aws/scripts/**/*"
    - "terraform/**/*"
    - "codepipeline-artifacts/validate.txt"

reports:
  checkov-reports:
    files:
      - "./reports/checkov.xml"
    file-format: "JUNITXML"
  tfsec-reports:
    files:
      - "./reports/tfsec-junit.xml"
    file-format: "JUNITXML"

cache:
  paths:
    - "/bin"
    - "/usr/local/bin"
    - "/root/.terraform"
    - "/root/.cache"
    - "/root/.gem"
    - "/usr/local/bundle"
